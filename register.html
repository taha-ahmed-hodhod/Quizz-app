<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Register</title>
</head>

<body class="bg-light">
    <div class="register container d-flex align-items-center justify-content-center">
        <div class="card shadow p-3 p-md-4 " style="width:90%">
            <h3 class="text-center mb-3 fw-bold fs-1">Register</h3>

            <div class="row">
                <div class="col-md-12">
                    <form id="registrationForm" method="get">
                        <div class="mb-1 g-3 row">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" oninput="validFirstName()" id="Fname" class="form-control p-2 p-md-3">
                                <div class="check" id="error_fn"></div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="Lname" oninput="validationLastName()" class="form-control p-2 p-md-3">
                                <div class="check" id="error_ln"></div>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label ">Email</label>
                            <input type="email" id="email" oninput="validationEmail()" class="form-control p-2 p-md-3">
                            <div class="check" id="error_email"></div>
                        </div>

                        <div class="mb-3 image">
                            <label class="form-label">Upload Profile Image</label>
                            <input type="file" id="file" onchange="validateFiles()" class="form-control p-2 p-md-3" accept="image/*">
                            <img id="imagePreview" src="assites/296fe121-5dfa-43f4-98b5-db50019738a7.jpg" class="img-thumbnail">
                            <div class="check" id="error_file"></div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" oninput="validationPassword()" class="form-control p-2 p-md-3">
                            <div class="check" id="error_pass"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Re-enter Password</label>
                            <input type="password" id="re_password" oninput="validationRePassword()" class="form-control p-2 p-md-3">
                            <div class="check" id="error_repass"></div>
                        </div>
                        <button type="submit" id="subimt" class="btn  w-100 p-2 p-md-3 fs-6 fs-md-5 fs-lg-4">Register</button>
                    </form>
                </div>
            </div>
            <hr>
            <p class="text-center">
                    you have an account? <a href="index.html">Login</a>
                </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
