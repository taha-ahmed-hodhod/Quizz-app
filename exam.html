<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examination System — Exam</title>

  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
</head>

<body>
  <div class="exam-page">

  
    <header class="exam-topbar">
      <span class="exam-title">Examination System</span>

      <div class="timer-wrapper">
        <div class="timer-bar-track">
          <div class="timer-bar-fill" id="timerFill"></div>
        </div>
        <span class="timer-label" id="timerLabel">--:--</span>
      </div>
    </header>


    <main class="exam-body" id="examBody">
   
    </main>

    <!-- FOOTER -->
    <footer class="exam-footer">
      <button class="btn-submit" id="submitBtn">Submit Exam</button>
    </footer>

  </div>

  <script type="module" src="js/exam.js"></script>
</body>
</html>
